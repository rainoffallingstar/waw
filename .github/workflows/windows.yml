name: Windows CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build tests
        run: cargo test --no-run

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run Windows test gate
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\run-windows-tests.ps1 -Clippy

      - name: Build release binary for live E2E
        shell: powershell
        run: cargo build --release

      - name: Run live Windows end-to-end gate
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\run-windows-live-e2e.ps1 -Binary .\target\release\waw.exe

      - name: Validate Windows release helper
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build-windows-release.ps1

      - name: Upload release artifact
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: actions/upload-artifact@v4
        with:
          name: waw-windows
          path: dist/waw.exe
          if-no-files-found: error

      - name: Compute release metadata
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        id: release_meta
        shell: powershell
        run: |
          $timezone = [System.TimeZoneInfo]::FindSystemTimeZoneById('China Standard Time')
          $date = [System.TimeZoneInfo]::ConvertTimeFromUtc([datetime]::UtcNow, $timezone).ToString('yyyy-MM-dd')
          "tag=$date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "name=Windows Build $date" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish rolling daily release
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          prerelease: true
          overwrite_files: true
          files: dist/waw.exe
          body: |
            Automated Windows build for `${{ github.sha }}`.
            This release tag is reused for every successful build on the same Asia/Shanghai calendar date.
